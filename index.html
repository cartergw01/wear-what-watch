<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wear What Watch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* ── Theme tokens ──────────────────────────────── */
        :root {
            --bg:               #f5f4f0;
            --spotlight:        radial-gradient(ellipse 60% 75% at 50% 42%, rgba(255,255,255,0.95) 0%, rgba(240,238,234,0.4) 55%, transparent 80%);
            --img-shadow:       drop-shadow(0 28px 60px rgba(70,70,70,0.22)) drop-shadow(0 8px 20px rgba(50,50,50,0.12));
            --face-name:        rgba(10,10,30,0.75);
            --face-sub:         rgba(10,10,30,0.30);
            --wordmark:         rgba(10,10,30,0.55);
            --dateline:         rgba(10,10,30,0.50);
            /* button — solid dark fill in light mode */
            --btn-bg:           rgba(11, 11, 28, 0.92);
            --btn-text:         rgba(255, 255, 255, 0.93);
            --btn-ring:         transparent;
            --btn-shadow:       0 4px 18px rgba(10,10,30,0.18), 0 1px 4px rgba(10,10,30,0.10);
            --btn-hover-bg:     rgba(11, 11, 28, 1.0);
            --btn-hover-shadow: 0 10px 40px rgba(10,10,30,0.30), 0 3px 10px rgba(10,10,30,0.16);
            --toggle-border:    rgba(10,10,30,0.10);
            --toggle-color:     rgba(10,10,30,0.40);
        }
        body.dark {
            --bg:               #080c18;
            --spotlight:        radial-gradient(ellipse 55% 70% at 50% 40%, rgba(255,255,255,0.04) 0%, transparent 65%);
            --img-shadow:       drop-shadow(0 12px 28px rgba(0,0,0,0.50));
            --face-name:        rgba(230,230,230,0.90);
            --face-sub:         rgba(200,200,200,0.45);
            --wordmark:         rgba(210,210,210,0.65);
            --dateline:         rgba(210,210,210,0.60);
            /* button — frosted-glass in dark mode, no blue glow */
            --btn-bg:           rgba(255,255,255,0.07);
            --btn-text:         rgba(230,230,230,0.96);
            --btn-ring:         rgba(255,255,255,0.14);
            --btn-shadow:       0 0 0 1px rgba(255,255,255,0.07), 0 8px 40px rgba(0,0,0,0.55);
            --btn-hover-bg:     rgba(255,255,255,0.12);
            --btn-hover-shadow: 0 0 0 1px rgba(255,255,255,0.18), 0 12px 52px rgba(0,0,0,0.65);
            --toggle-border:    rgba(200,200,200,0.15);
            --toggle-color:     rgba(200,200,200,0.50);
        }

        /* ── Reset ─────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
            transition: background 0.5s;
            cursor: default;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--spotlight);
            pointer-events: none;
            transition: background 0.5s, opacity 0.5s;
            z-index: 0;
        }
        body.dark::before { opacity: 0; }

        #ambient {
            position: fixed;
            inset: 0;
            opacity: 0;
            transition: opacity 0.5s ease, background 0.3s ease;
            pointer-events: none;
            z-index: 0;
        }
        #ambient.show { opacity: 0.60; }

        /* ── Per-watch aura burst animations ────────────── */
        @keyframes auraBlue {
            0%   { opacity: 0;    }
            22%  { opacity: 1;    }
            60%  { opacity: 0.78; }
            100% { opacity: 0.60; }
        }
        @keyframes auraGreen {
            0%   { opacity: 0;    }
            18%  { opacity: 1;    }
            45%  { opacity: 0.88; }
            72%  { opacity: 0.75; }
            100% { opacity: 0.60; }
        }
        @keyframes auraLed {
            0%   { opacity: 0;    }
            5%   { opacity: 1;    }
            18%  { opacity: 0.92; }
            55%  { opacity: 0.70; }
            100% { opacity: 0.55; }
        }
        @keyframes auraGold {
            0%   { opacity: 0;    }
            20%  { opacity: 1;    }
            55%  { opacity: 0.82; }
            100% { opacity: 0.62; }
        }
        #ambient.burst-blue  { animation: auraBlue  1.7s cubic-bezier(0.22,1,0.36,1) forwards; }
        #ambient.burst-green { animation: auraGreen 2.0s cubic-bezier(0.22,1,0.36,1) forwards; }
        #ambient.burst-led   { animation: auraLed   1.3s cubic-bezier(0.22,1,0.36,1) forwards; }
        #ambient.burst-gold  { animation: auraGold  1.9s cubic-bezier(0.22,1,0.36,1) forwards; }

        /* ── Wordmark ───────────────────────────────────── */
        .wordmark {
            position: fixed;
            top: 28px; left: 50%;
            transform: translateX(-50%);
            color: var(--wordmark);
            font-size: 11px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 600;
            white-space: nowrap;
            transition: color 0.5s;
            pointer-events: none;
            z-index: 10;
        }

        /* ── Dark toggle ────────────────────────────────── */
        .toggle-dark {
            position: fixed;
            top: 22px; right: 22px;
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 1px solid var(--toggle-border);
            background: transparent;
            color: var(--toggle-color);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color .3s, color .3s, transform .15s;
            touch-action: manipulation;
            z-index: 100;
        }
        .toggle-dark:hover  { transform: scale(1.12); border-color: var(--btn-hover-border); }
        .toggle-dark:active { transform: scale(0.94); }

        /* ── Date ───────────────────────────────────────── */
        .date-line {
            position: fixed;
            bottom: 26px; left: 50%;
            transform: translateX(-50%);
            color: var(--dateline);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            white-space: nowrap;
            transition: color 0.5s;
            pointer-events: none;
            z-index: 10;
        }

        /* ── Stage ──────────────────────────────────────── */
        .stage {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            z-index: 1;
        }

        /* ── Slot machine ───────────────────────────────── */
        /*
         * The viewport clips the scrolling strip. The CSS mask creates
         * a fade at top/bottom so adjacent watches blur into the background,
         * giving the classic slot-reel depth effect.
         */
        .slot-viewport {
            position: relative;
            width: clamp(260px, 88vw, 500px);
            height: clamp(340px, 62vh, 580px);
            overflow: hidden;
            -webkit-mask-image: linear-gradient(to bottom,
                transparent 0%, black 18%, black 82%, transparent 100%);
            mask-image: linear-gradient(to bottom,
                transparent 0%, black 18%, black 82%, transparent 100%);
        }

        .slot-strip {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        /* Each item matches viewport height exactly → one watch visible at a time */
        .slot-item {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 48px 20px;
        }

        .slot-img-wrap {
            width: 100%;
            height: 72%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slot-img-wrap img {
            max-width: 88%;
            max-height: 100%;
            object-fit: contain;
            filter: var(--img-shadow);
            transition: filter 0.5s;
            pointer-events: none;
            draggable: false;
        }

        .slot-label {
            text-align: center;
        }

        .face-name {
            font-family: 'Playfair Display', Georgia, serif;
            color: var(--face-name);
            font-size: 15px;
            font-weight: 700;
            transition: color 0.5s;
        }

        .face-sub {
            color: var(--face-sub);
            font-size: 8px;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            margin-top: 6px;
            font-weight: 700;
            transition: color 0.5s;
        }

        /* ── SPIN button ────────────────────────────────── */
        .btn {
            background: var(--btn-bg);
            border: 1px solid var(--btn-ring);
            color: var(--btn-text);
            padding: 18px 70px;
            border-radius: 100px;
            font-size: 9.5px;
            letter-spacing: 8px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            box-shadow: var(--btn-shadow);
            transition: background .35s, box-shadow .35s, border-color .35s, transform .12s;
            position: relative;
            z-index: 1;
            touch-action: manipulation;
        }
        .btn:hover:not(:disabled) {
            background: var(--btn-hover-bg);
            box-shadow: var(--btn-hover-shadow);
            transform: translateY(-2px);
        }
        .btn:active:not(:disabled) {
            transform: translateY(0) scale(0.97);
            box-shadow: var(--btn-shadow);
        }
        .btn:disabled { opacity: 0.22; cursor: default; transform: none; }

        /* ── Slot tick — detent pop as a watch enters center ── */
        @keyframes slotTick {
            0%   { transform: scale(1.0)  translateY(0);   }
            30%  { transform: scale(0.93) translateY(4px); }
            100% { transform: scale(1.0)  translateY(0);   }
        }
        .slot-tick { animation: slotTick 0.13s cubic-bezier(0.25, 0, 0.45, 1) forwards; }


        /* ── Mobile ─────────────────────────────────────── */
        @media (max-width: 640px) {
            .stage    { gap: 20px; }
            .btn      { padding: 15px 44px; }
            .wordmark { letter-spacing: 5px; }
        }

        /* ── Landscape mobile ───────────────────────────── */
        @media (max-width: 900px) and (max-height: 480px) {
            .slot-viewport { height: 50vh; height: 50svh; }
            .stage    { gap: 10px; }
            .wordmark { top: 14px; }
            .date-line { bottom: 12px; }
        }
    </style>
</head>
<body class="dark">

<div id="ambient"></div>
<div class="wordmark">Wear What Watch</div>
<button class="toggle-dark" id="toggleDark" title="Toggle light/dark">☀</button>

<div class="stage">
    <div class="slot-viewport" id="viewport">
        <div class="slot-strip" id="strip"></div>
    </div>
    <button class="btn" id="btn" onclick="spin()">SPIN</button>
</div>

<div class="date-line" id="dateLine"></div>

<script>
const WATCHES = [
    {
        img:   'photos/aquaterra.png',
        name:  'Omega Seamaster',
        sub:   'Aqua Terra · 38mm',
        burst: 'burst-blue',
        glowDark:  'radial-gradient(ellipse 80% 70% at 50% 50%, rgba(18,55,220,0.70) 0%, rgba(10,30,140,0.28) 55%, transparent 82%)',
        glowLight: 'radial-gradient(ellipse 80% 70% at 50% 50%, rgba(18,65,210,0.32) 0%, rgba(10,40,160,0.12) 55%, transparent 82%)'
    },
    {
        img:   'photos/speedtimer_nightvision.png',
        name:  'Seiko Prospex',
        sub:   'Speedtimer · SSC813',
        burst: 'burst-green',
        glowDark:  'radial-gradient(ellipse 80% 70% at 50% 50%, rgba(100,220,45,0.65) 0%, rgba(55,160,20,0.28) 55%, transparent 82%)',
        glowLight: 'radial-gradient(ellipse 80% 70% at 50% 50%, rgba(70,185,25,0.30) 0%, rgba(40,130,15,0.12) 55%, transparent 82%)'
    },
    {
        img:   'photos/presage_white.png',
        name:  'Seiko Presage',
        sub:   'SRPB43 · Automatic',
        burst: 'burst-led',
        glowDark:  'radial-gradient(ellipse 80% 70% at 50% 50%, rgba(220,235,255,0.80) 0%, rgba(180,215,255,0.35) 45%, transparent 78%)',
        glowLight: 'radial-gradient(ellipse 80% 70% at 50% 50%, rgba(190,215,255,0.38) 0%, rgba(155,195,255,0.15) 45%, transparent 78%)'
    },
    {
        img:   'photos/luminor_due.png',
        name:  'Panerai Luminor Due',
        sub:   'OP7242 · 38mm',
        burst: 'burst-gold',
        glowDark:  'radial-gradient(ellipse 80% 70% at 50% 50%, rgba(210,140,30,0.72) 0%, rgba(175,95,15,0.30) 55%, transparent 82%)',
        glowLight: 'radial-gradient(ellipse 80% 70% at 50% 50%, rgba(200,130,20,0.30) 0%, rgba(165,90,10,0.12) 55%, transparent 82%)'
    }
];

const N    = WATCHES.length;
const REPS = 15; // strip = 45 items total; resets silently keep idx in safe zone

const viewport = document.getElementById('viewport');
const strip    = document.getElementById('strip');
const btn      = document.getElementById('btn');
const ambient  = document.getElementById('ambient');

// ── Build strip (REPS repetitions of all watches) ──
for (let r = 0; r < REPS; r++) {
    for (let i = 0; i < N; i++) {
        const w    = WATCHES[i];
        const item = document.createElement('div');
        item.className = 'slot-item';
        item.innerHTML = `
            <div class="slot-img-wrap">
                <img src="${w.img}" alt="${w.name}" draggable="false">
            </div>
            <div class="slot-label">
                <div class="face-name">${w.name}</div>
                <div class="face-sub">${w.sub}</div>
            </div>`;
        strip.appendChild(item);
    }
}

// ── Date ──────────────────────────────────────────
document.getElementById('dateLine').textContent =
    new Date().toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric'
    }).toUpperCase();

// ── Helper: show the aura for a given watch index ─
function showAura(idx) {
    const w = WATCHES[idx];
    const isDark = document.body.classList.contains('dark');
    ambient.style.background = isDark ? w.glowDark : w.glowLight;
    ambient.classList.remove('show', 'burst-blue', 'burst-green', 'burst-led', 'burst-gold');
    void ambient.offsetWidth; // force reflow to restart animation
    ambient.classList.add('show', w.burst);
}

// ── Dark mode toggle ──────────────────────────────
const toggleBtn = document.getElementById('toggleDark');
toggleBtn.addEventListener('click', e => {
    e.stopPropagation();
    const isDark = document.body.classList.toggle('dark');
    toggleBtn.textContent = isDark ? '☀' : '🌙';
    // Re-apply glow in new mode if a watch is showing
    if (lastWinner >= 0 && ambient.classList.contains('show')) {
        const w = WATCHES[lastWinner];
        ambient.style.background = isDark ? w.glowDark : w.glowLight;
    }
});

// ── State ─────────────────────────────────────────
// slotIdx: which item in the strip is currently centered.
// Start at the middle of the strip, watch 0.
let slotIdx    = Math.floor(REPS / 2) * N;
let renderY    = 0;   // current strip translateY in px
let spinning   = false;
let lastWinner = -1;

function itemH() { return viewport.clientHeight; }

function setY(y, instant) {
    renderY = y;
    if (instant) {
        strip.style.transition = 'none';
        strip.style.transform  = `translateY(${y}px)`;
        strip.offsetHeight;    // force reflow
    } else {
        strip.style.transform = `translateY(${y}px)`;
    }
}

function layout() {
    const h = itemH();
    strip.querySelectorAll('.slot-item').forEach(el => { el.style.height = h + 'px'; });
    setY(-slotIdx * h, true);
}

layout();
window.addEventListener('resize', layout);

// ── Easing ────────────────────────────────────────
// High-power ease-out: fast start, very slow drift into the final position
function easeSpinOut(t) {
    if (t >= 1) return 1;
    return 1 - Math.pow(1 - t, 8);
}
// Spring snap with slight overshoot — makes scroll feel clicky
function easeOutBack(t) {
    const c1 = 1.55, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

// ── Spin ──────────────────────────────────────────
function spin() {
    if (spinning) return;
    spinning = true;
    btn.disabled = true;
    ambient.classList.remove('show', 'burst-blue', 'burst-green', 'burst-led', 'burst-gold');

    const winner = Math.floor(Math.random() * N);

    // Go backward 3 full cycles + backDelta to land on winner (spins DOWN)
    const currentWatch = slotIdx % N;
    let backDelta = (currentWatch - winner + N) % N;
    if (backDelta === 0) backDelta = N;
    const targetIdx = slotIdx - 3 * N - backDelta;

    const h     = itemH();
    const fromY = renderY;
    const toY   = -targetIdx * h;
    const dur   = 3000 + Math.random() * 500;
    const start = performance.now();

    (function frame(now) {
        const t = Math.min((now - start) / dur, 1);
        setY(fromY + (toY - fromY) * easeSpinOut(t), false);
        if (t < 1) {
            requestAnimationFrame(frame);
        } else {
            slotIdx    = targetIdx;
            lastWinner = winner;
            spinning   = false;
            btn.disabled = false;
            showAura(winner);

            // Silently reset if drifting toward start of strip
            if (slotIdx < 5 * N) {
                slotIdx += Math.floor(REPS / 2) * N;
                setY(-slotIdx * itemH(), true);
            }
        }
    })(start);
}

// ── Spacebar ──────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); spin(); }
});

// ── Touch — swipe to browse, tap to spin ──────────
let touchStartY        = null;
let touchStartY_render = 0;
let touchMoved         = false;
let lastTouchY         = null;
let lastTouchTime      = null;
let velSamples         = [];
let lastTickIdx        = null;

function fireTick(idx) {
    const item = strip.children[idx];
    if (!item) return;
    const wrap = item.querySelector('.slot-img-wrap');
    wrap.classList.remove('slot-tick');
    void wrap.offsetWidth;
    wrap.classList.add('slot-tick');
}

document.addEventListener('touchstart', e => {
    if (spinning) return;
    touchStartY        = e.touches[0].clientY;
    touchStartY_render = renderY;
    lastTouchY         = touchStartY;
    lastTouchTime      = performance.now();
    touchMoved         = false;
    velSamples         = [];
    lastTickIdx        = Math.round(-renderY / itemH());
    ambient.classList.remove('show', 'burst-blue', 'burst-green', 'burst-led', 'burst-gold');
}, { passive: true });

document.addEventListener('touchmove', e => {
    if (spinning || touchStartY === null) return;
    const y   = e.touches[0].clientY;
    const now = performance.now();
    const dt  = now - lastTouchTime;
    if (Math.abs(y - touchStartY) > 4) touchMoved = true;
    if (dt > 0) {
        velSamples.push({ v: (lastTouchY - y) / dt, t: now });
        if (velSamples.length > 6) velSamples.shift();
    }
    lastTouchY    = y;
    lastTouchTime = now;
    setY(touchStartY_render - (touchStartY - y), true);

    // Fire tick animation each time a new slot crosses to center
    const centerIdx = Math.round(-renderY / itemH());
    if (centerIdx !== lastTickIdx) {
        fireTick(centerIdx);
        lastTickIdx = centerIdx;
    }
}, { passive: true });

document.addEventListener('touchend', () => {
    if (touchStartY === null) return;
    const wasTap = !touchMoved;
    touchStartY = null;
    touchMoved  = false;
    if (wasTap) return; // tap does nothing — use the SPIN button

    // Compute flick velocity and snap to nearest watch (±3 max)
    const now    = performance.now();
    const recent = velSamples.filter(s => now - s.t < 120);
    const vel    = recent.length
        ? recent.reduce((s, x) => s + x.v, 0) / recent.length
        : 0;

    const h         = itemH();
    const rawIdx    = -renderY / h;
    // Guarantee at least ±1 advance for any real flick (|vel| > 0.18 px/ms)
    const flickRaw  = vel * 480 / h;
    const flick     = Math.abs(vel) > 0.18
        ? Math.max(-3, Math.min(3, vel > 0 ? Math.max(1, Math.round(flickRaw)) : Math.min(-1, Math.round(flickRaw))))
        : 0;
    let   targetIdx = Math.round(rawIdx) + flick;
    targetIdx = Math.max(1, Math.min(REPS * N - 2, targetIdx));

    const fromY = renderY;
    const toY   = -targetIdx * h;
    // Snappy: 80–200 ms regardless of distance
    const dur   = 80 + Math.min(Math.abs(toY - fromY) * 0.14, 120);
    const start = performance.now();
    spinning = true; btn.disabled = true;

    (function frame(now) {
        const t = Math.min((now - start) / dur, 1);
        setY(fromY + (toY - fromY) * easeOutBack(t), false);
        if (t < 1) {
            requestAnimationFrame(frame);
        } else {
            slotIdx    = targetIdx;
            lastWinner = slotIdx % N;
            spinning   = false;
            btn.disabled = false;
            showAura(lastWinner);
            // Subtle reveal on swipe-settle too
            fireTick(targetIdx);
        }
    })(start);
});
</script>

</body>
</html>
