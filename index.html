<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wear What Watch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            background: #f4f7fb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 70% 60% at 50% 48%, #ffffff 0%, transparent 70%);
            pointer-events: none;
        }

        #ambient {
            position: fixed;
            inset: 0;
            opacity: 0;
            transition: opacity 1.4s ease, background 1.4s ease;
            pointer-events: none;
        }
        #ambient.show { opacity: 1; }

        .wordmark {
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(10,20,50,0.25);
            font-size: 9px;
            letter-spacing: 7px;
            text-transform: uppercase;
            font-weight: 300;
            white-space: nowrap;
        }

        .date-line {
            position: fixed;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(10,20,50,0.2);
            font-size: 9px;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* ── Swivel container — bigger ───────────────── */
        .swivel-wrap {
            position: relative;
            width: 600px;
            height: 680px;
            touch-action: pan-y; /* allow vertical scroll, capture horizontal */
        }

        /* ── Glass cylinder ──────────────────────────── */
        /* face 290×510, radius 175 → cyl left=(600-300)/2=150, height=510, top=(680-510)/2=85 */
        .cyl {
            position: absolute;
            left:  150px;
            right: 150px;
            top:   85px;
            height: 510px;
            pointer-events: none;
        }

        .cyl-back {
            border-left:  2px solid rgba(255,255,255,0.95);
            border-right: 2px solid rgba(210,220,240,0.6);
            background: linear-gradient(90deg,
                rgba(185,205,240,0.28) 0%,
                rgba(210,225,248,0.07) 14%,
                rgba(220,232,252,0.03) 35%,
                rgba(220,232,252,0.03) 65%,
                rgba(210,225,248,0.07) 86%,
                rgba(185,205,240,0.22) 100%
            );
            box-shadow:
                inset 14px 0 32px rgba(185,205,240,0.18),
                inset -8px 0 20px rgba(185,205,240,0.1);
        }

        .cyl-back::before {
            content: '';
            position: absolute;
            top: -12px;
            left: -6px; right: -6px;
            height: 24px;
            background: radial-gradient(ellipse 70% 55% at 50% 50%,
                rgba(255,255,255,0.85),
                rgba(215,228,252,0.5) 55%,
                transparent 80%
            );
            border: 1.5px solid rgba(255,255,255,0.75);
            border-radius: 50%;
            box-shadow: 0 0 22px rgba(180,205,255,0.5);
        }

        .cyl-back::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: -6px; right: -6px;
            height: 24px;
            background: rgba(200,215,245,0.12);
            border: 1px solid rgba(200,215,245,0.35);
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(160,185,230,0.2);
        }

        .cyl-front::before {
            content: '';
            position: absolute;
            top: -12px;
            left: -6px; right: -6px;
            height: 12px;
            background: linear-gradient(to bottom, rgba(255,255,255,1), rgba(230,240,255,0.85) 70%, transparent);
            border-top:   2px solid rgba(255,255,255,1);
            border-left:  1.5px solid rgba(230,240,255,0.7);
            border-right: 1.5px solid rgba(200,218,248,0.5);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            box-shadow: 0 0 24px rgba(200,218,255,0.7), 0 2px 8px rgba(170,198,255,0.35);
        }

        .cyl-front::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: -6px; right: -6px;
            height: 12px;
            background: rgba(210,225,250,0.25);
            border-bottom: 1.5px solid rgba(190,210,245,0.5);
            border-left:   1px solid rgba(190,210,245,0.3);
            border-right:  1px solid rgba(190,210,245,0.3);
            border-radius: 0 0 50% 50% / 0 0 100% 100%;
            box-shadow: 0 4px 10px rgba(160,185,230,0.25);
        }

        .cyl-shadow {
            position: absolute;
            bottom: 44px;
            left: 120px; right: 120px;
            height: 30px;
            background: radial-gradient(ellipse, rgba(120,150,220,0.18) 0%, transparent 70%);
            filter: blur(8px);
            pointer-events: none;
        }

        /* ── 3D scene ────────────────────────────────── */
        .scene {
            position: absolute;
            inset: 0;
            perspective: 920px;
            perspective-origin: 50% 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rotor {
            position: relative;
            width:  290px;
            height: 510px;
            transform-style: preserve-3d;
        }

        /* ── Face panels ─────────────────────────────── */
        .face {
            position: absolute;
            inset: 0;
            width:  290px;
            height: 510px;
            border-radius: 28px;
            overflow: hidden;
            background:
                linear-gradient(145deg, rgba(255,255,255,0.72) 0%, transparent 42%),
                linear-gradient(170deg, rgba(236,244,255,0.94) 0%, rgba(218,232,255,0.82) 100%);
            border: 1px solid rgba(255,255,255,0.98);
            box-shadow:
                0 36px 100px rgba(110,140,220,0.22),
                0  8px  24px rgba( 90,120,200,0.1),
                inset 0  1px 0 rgba(255,255,255,1),
                inset 0 -1px 0 rgba(140,170,240,0.12),
                inset  1px 0 0 rgba(255,255,255,0.75),
                inset -1px 0 0 rgba(140,168,238,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 18px 26px;
        }

        .face::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 55%;
            background: linear-gradient(160deg,
                rgba(255,255,255,0.55) 0%,
                rgba(255,255,255,0.18) 35%,
                transparent 60%
            );
            pointer-events: none;
        }

        .f0 { transform: rotateY(0deg)   translateZ(175px); }
        .f1 { transform: rotateY(120deg) translateZ(175px); }
        .f2 { transform: rotateY(240deg) translateZ(175px); }

        .face-img-wrap {
            flex: 1;
            width: 100%;
            min-height: 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }

        .face-img-wrap img {
            max-width:  100%;
            max-height: 100%;
            object-fit: contain;
            object-position: center bottom;
            filter: drop-shadow(0 10px 28px rgba(80,110,200,0.2));
        }

        /* Omega photo has more whitespace — scale up to match */
        .f0 .face-img-wrap img {
            transform: scale(1.28);
            transform-origin: center 65%;
        }

        .face-info {
            flex-shrink: 0;
            text-align: center;
            margin-top: 14px;
        }

        .face-name {
            font-family: 'Playfair Display', Georgia, serif;
            color: rgba(10,18,50,0.84);
            font-size: 14px;
            font-weight: 500;
        }
        .face-sub {
            color: rgba(10,18,50,0.3);
            font-size: 8px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .wear-today {
            height: 18px;
            color: rgba(10,20,60,0.3);
            font-size: 9px;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.8s ease 0.4s;
        }
        .wear-today.show { opacity: 1; }

        .btn {
            background: transparent;
            border: 1px solid rgba(10,20,60,0.12);
            color: rgba(10,20,60,0.38);
            padding: 13px 50px;
            border-radius: 100px;
            font-size: 9px;
            letter-spacing: 6px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            transition: border-color .3s, color .3s, box-shadow .3s, transform .1s;
        }
        .btn:hover:not(:disabled) {
            border-color: rgba(10,20,60,0.28);
            color: rgba(10,20,60,0.72);
            box-shadow: 0 4px 24px rgba(100,130,220,0.1);
        }
        .btn:active:not(:disabled) { transform: scale(0.96); }
        .btn:disabled { opacity: 0.25; cursor: default; }

        @media (max-width: 640px) {
            .swivel-wrap { transform: scale(0.6); transform-origin: center top; }
            .stage { gap: 0px; margin-top: -80px; }
        }
    </style>
</head>
<body>

<div id="ambient"></div>
<div class="wordmark">Wear What Watch</div>

<div class="stage">
    <div class="swivel-wrap" id="swivelWrap">

        <div class="cyl cyl-back"></div>

        <div class="scene">
            <div class="rotor" id="rotor">

                <div class="face f0">
                    <div class="face-img-wrap">
                        <img src="photos/aquaterra.jpg" alt="Omega Seamaster Aqua Terra">
                    </div>
                    <div class="face-info">
                        <div class="face-name">Omega Seamaster</div>
                        <div class="face-sub">Aqua Terra · 38mm</div>
                    </div>
                </div>

                <div class="face f1">
                    <div class="face-img-wrap">
                        <img src="photos/speedtimer_nightvision.jpg" alt="Seiko Prospex Speedtimer Night Vision">
                    </div>
                    <div class="face-info">
                        <div class="face-name">Seiko Prospex</div>
                        <div class="face-sub">Speedtimer · Night Vision</div>
                    </div>
                </div>

                <div class="face f2">
                    <div class="face-img-wrap">
                        <img src="photos/presage_white.png" alt="Seiko Presage">
                    </div>
                    <div class="face-info">
                        <div class="face-name">Seiko Presage</div>
                        <div class="face-sub">SRPB43</div>
                    </div>
                </div>

            </div>
        </div>

        <div class="cyl cyl-front"></div>
        <div class="cyl-shadow"></div>

    </div>

    <div class="wear-today" id="wearToday">Wear today</div>
    <button class="btn" id="btn" onclick="spin()">SPIN</button>
</div>

<div class="date-line" id="dateLine"></div>

<script>
const glows = [
    "radial-gradient(ellipse 60% 55% at 50% 50%, rgba(38,90,195,0.07) 0%, transparent 70%)",
    "radial-gradient(ellipse 60% 55% at 50% 50%, rgba(100,115,135,0.07) 0%, transparent 70%)",
    "radial-gradient(ellipse 60% 55% at 50% 50%, rgba(28,60,155,0.07) 0%, transparent 70%)",
];

const rotor     = document.getElementById('rotor');
const btn       = document.getElementById('btn');
const wearToday = document.getElementById('wearToday');
const ambient   = document.getElementById('ambient');

document.getElementById('dateLine').textContent =
    new Date().toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric'
    }).toUpperCase();

let angle    = 0;
let spinning = false;

function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

// ── Spin (button / spacebar) ─────────────────────
function spin() {
    if (spinning) return;
    spinning = true;
    btn.disabled = true;
    wearToday.classList.remove('show');
    ambient.classList.remove('show');

    const winner = Math.floor(Math.random() * 3);

    const currMod   = ((angle % 360) + 360) % 360;
    const targetMod = ((-winner * 120) % 360 + 360) % 360;
    let   delta     = (currMod - targetMod + 360) % 360;
    if (delta < 1) delta = 360;
    const targetAngle = angle - (delta + 3 * 360);

    animateTo(targetAngle, easeOutQuint, 3000 + Math.random() * 900, winner);
}

function animateTo(targetAngle, easeFn, duration, winner) {
    const from    = angle;
    const startTs = performance.now();

    (function frame(now) {
        const t   = Math.min((now - startTs) / duration, 1);
        const deg = from + (targetAngle - from) * easeFn(t);
        rotor.style.transform = `rotateY(${deg}deg)`;

        if (t < 1) {
            requestAnimationFrame(frame);
        } else {
            angle   = targetAngle;
            spinning = false;
            btn.disabled = false;
            btn.textContent = 'SPIN AGAIN';
            wearToday.classList.add('show');
            ambient.style.background = glows[winner];
            ambient.classList.add('show');
        }
    })(startTs);
}

// ── Spacebar ─────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
        e.preventDefault();
        spin();
    }
});

// ── Touch swipe to rotate ─────────────────────────
// face i is at front when rotor = -i*120 (mod 360)
// display mods: face0→0°, face1→240°, face2→120°
const FACE_MODS = [0, 240, 120]; // index = face number

function nearestFace() {
    const currMod = ((angle % 360) + 360) % 360;
    let best = { face: 0, signedDist: 0 };
    let minAbs = Infinity;

    for (let i = 0; i < 3; i++) {
        let d = currMod - FACE_MODS[i];
        // wrap to [-180, 180]
        if (d >  180) d -= 360;
        if (d < -180) d += 360;
        if (Math.abs(d) < minAbs) {
            minAbs = Math.abs(d);
            best = { face: i, signedDist: d };
        }
    }
    return best;
}

function snapToNearest() {
    const { face, signedDist } = nearestFace();
    const targetAngle = angle - signedDist;
    const duration    = 200 + Math.abs(signedDist) * 2.5;

    spinning = true;
    btn.disabled = true;
    const from    = angle;
    const startTs = performance.now();

    (function frame(now) {
        const t   = Math.min((now - startTs) / duration, 1);
        const deg = from + (targetAngle - from) * easeOutCubic(t);
        rotor.style.transform = `rotateY(${deg}deg)`;

        if (t < 1) {
            requestAnimationFrame(frame);
        } else {
            angle    = targetAngle;
            spinning = false;
            btn.disabled = false;
            btn.textContent = 'SPIN AGAIN';
            wearToday.classList.add('show');
            ambient.style.background = glows[face];
            ambient.classList.add('show');
        }
    })(startTs);
}

let touchStartX    = null;
let touchStartAngle = null;
let lastTouchX     = null;
let touchVelocity  = 0;
let lastTouchTime  = null;

document.getElementById('swivelWrap').addEventListener('touchstart', e => {
    if (spinning) return;
    touchStartX     = e.touches[0].clientX;
    touchStartAngle = angle;
    lastTouchX      = touchStartX;
    touchVelocity   = 0;
    lastTouchTime   = performance.now();
    wearToday.classList.remove('show');
}, { passive: true });

document.getElementById('swivelWrap').addEventListener('touchmove', e => {
    if (spinning || touchStartX === null) return;

    const x    = e.touches[0].clientX;
    const now  = performance.now();
    const dt   = now - lastTouchTime;

    if (dt > 0) {
        touchVelocity = (lastTouchX - x) / dt; // deg per ms (scaled below)
    }
    lastTouchX   = x;
    lastTouchTime = now;

    const delta = x - touchStartX;
    angle = touchStartAngle - delta * 0.45;
    rotor.style.transform = `rotateY(${angle}deg)`;
}, { passive: true });

document.getElementById('swivelWrap').addEventListener('touchend', () => {
    if (touchStartX === null) return;
    touchStartX = null;

    // Small flick momentum then snap
    const momentum = touchVelocity * 120; // project forward ~120ms
    angle -= momentum;
    rotor.style.transform = `rotateY(${angle}deg)`;

    requestAnimationFrame(() => snapToNearest());
});
</script>

</body>
</html>
